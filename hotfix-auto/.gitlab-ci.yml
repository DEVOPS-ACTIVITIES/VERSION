stages:
  - check
  - deploy
  - success

success:
  stage: success
  script:
    - echo "success"

check-merge-conflicts:
  stage: check
  image: alpine:latest
  variables:
    GIT_DEPTH: 0
    TARGET_BRANCHES: "qa test dev feature main"
  script:
    - apk add --no-cache git
    - git config --global user.email "$GITLAB_USER_EMAIL"
    - git config --global user.name "$GITLAB_USER_NAME"
    - git remote set-url origin "https://oauth2:${SYNC_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch origin
    - mkdir -p conflict-reports
    - sh scripts/check-merge-conflicts.sh
  allow_failure: true
  artifacts:
    name: "conflict-reports-${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}-${CI_PIPELINE_ID}"
    when: always
    expire_in: 7 days
    paths:
      - conflict-reports/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^hotfix/ && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "feat"'
      when: always
    - when: never

sync-environment-branches:
  stage: deploy
  image: alpine:latest
  variables:
    GIT_DEPTH: 0
    TARGET_BRANCHES: "qa test dev feature main"
  script:
    - apk add --no-cache git
    - git config --global user.email "$GITLAB_USER_EMAIL"
    - git config --global user.name "$GITLAB_USER_NAME"
    - git remote set-url origin "https://oauth2:${SYNC_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch origin
    - sh scripts/sync-environment-branches.sh
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "feat" && $CI_COMMIT_TITLE =~ /hotfix/'
      when: always
    - when: never
